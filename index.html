<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Builder Roadmap</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:black;
color:white;

font-family:
-apple-system,
BlinkMacSystemFont,
sans-serif;

overflow-x:hidden;

}


body::before{

content:"";

position:fixed;

top:-300px;
right:-300px;

width:800px;
height:800px;

background:
radial-gradient(circle,
rgba(255,255,255,.08),
transparent);

filter:blur(120px);

z-index:-1;

}


.container{

max-width:1400px;

margin:auto;

padding:80px 32px;

}



.hero{


min-height:100vh;


display:flex;


align-items:center;


justify-content:space-between;


gap:100px;


}



.left{

max-width:700px;

}


.eyebrow{

font-size:13px;

letter-spacing:2px;

text-transform:uppercase;

color:#666;

margin-bottom:24px;

}



h1{


font-size:clamp(70px,9vw,130px);


line-height:.9;


letter-spacing:-4px;


font-weight:700;


}



.subtitle{


margin-top:30px;


font-size:26px;


line-height:1.6;


max-width:600px;


color:
rgba(255,255,255,.65);


}



button{


margin-top:50px;


padding:18px 34px;


border:none;


border-radius:999px;


background:white;


color:black;


font-size:16px;


font-weight:600;


cursor:pointer;


transition:.3s;


}



button:hover{


transform:translateY(-3px);


}



.card{


width:400px;


padding:32px;


border-radius:32px;


background:
rgba(255,255,255,.03);


backdrop-filter:blur(40px);


border:
1px solid rgba(255,255,255,.08);



box-shadow:


0 0 80px rgba(255,255,255,.04);


}



.top{

font-size:14px;

color:#888;

margin-bottom:24px;

}



.circle{


width:64px;


height:64px;


border-radius:100px;


background:white;


display:flex;


align-items:center;


justify-content:center;


color:black;


font-size:28px;


margin-bottom:24px;


}



.card h3{


font-size:32px;


margin-bottom:16px;


}


.card p{


line-height:2;


color:#aaa;


}



@media(max-width:900px){


.hero{


flex-direction:column;


padding-top:60px;


}


.card{


width:100%;


}


h1{


font-size:70px;


}


.subtitle{


font-size:22px;


}


}


</style>

</head>

<body>



<div class="container">


<section class="hero">



<div class="left">


<p class="eyebrow">

2026 ROADMAP

</p>



<h1>

From Noob<br>

to Builder.

</h1>



<p class="subtitle">


Learn enough to direct AI.

Ship products.

Build leverage.


</p>



<button>

Start Journey

</button>



</div>






<div class="card">



<div class="top">

Builder AI

</div>



<div class="circle">

◉

</div>



<h3>

How can I help?

</h3>



<p>


✓ Learn HTML


<br>


✓ Build Apps


<br>


✓ Ship Products



</p>


</div>



</section>



</div>


</body>


</html>
